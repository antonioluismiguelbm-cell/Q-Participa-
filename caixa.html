<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franguité Q Participa - Painel do Caixa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 15px; }
        
        header { 
            background: linear-gradient(135deg, #1a237e, #283593); 
            color: white; 
            padding: 15px 20px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .header-title h1 { font-size: 20px; }
        .header-title p { font-size: 12px; opacity: 0.8; }
        
        .status-badge {
            background-color: #4caf50;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .pedidos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .card-pedido {
            background: white;
            border-radius: 10px;
            padding: 15px;
            border-left: 5px solid #ff9800;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-pedido.pendente { border-left-color: #f44336; }
        .card-pedido.preparo { border-left-color: #ff9800; }
        .card-pedido.pronto { border-left-color: #2196f3; }
        .card-pedido.entregue { border-left-color: #4caf50; opacity: 0.6; }

        .pedido-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .pedido-id { font-weight: bold; color: #1a237e; font-size: 14px; }
        .pedido-hora { font-size: 11px; color: #777; }

        .cliente-info { font-size: 13px; margin-bottom: 10px; }
        .cliente-info p { margin-bottom: 3px; }

        .itens-lista {
            background: #fafafa;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 10px;
            border: 1px solid #f0f0f0;
            white-space: pre-line;
        }

        .total-destaque {
            font-size: 16px;
            font-weight: bold;
            color: #b71c1c;
            text-align: right;
            margin-bottom: 10px;
        }

        .btn-group-card {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-card {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            text-align: center;
        }

        .btn-preparo { background-color: #ff9800; }
        .btn-pronto { background-color: #2196f3; }
        .btn-entregue { background-color: #4caf50; }
    </style>

    <!-- Conexão com o Firebase do Franguité -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = {
        authDomain: "caixa-participa.firebaseapp.com",
        databaseURL: "https://caixa-participa-default-rtdb.firebaseio.com",
        projectId: "caixa-participa",
        storageBucket: "caixa-participa.firebasestorage.app",
        messagingSenderId: "794078215128",
        appId: "1:794078215128:web:b62d34..."
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // Ouve os pedidos em tempo real
      const pedidosRef = ref(db, 'pedidos/');
      onValue(pedidosRef, (snapshot) => {
        const data = snapshot.val();
        renderizarPedidos(data);
      });

      window.alterarEstado = function(id, novoEstado) {
        update(ref(db, 'pedidos/' + id), { estado: novoEstado });
      };
    </script>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>🍗 Franguité Q Participa — Painel do Caixa</h1>
            <p>Atendimento & Grelha em Tempo Real</p>
        </div>
        <div class="status-badge">● Sistema Conectado</div>
    </header>

    <div class="pedidos-grid" id="container-pedidos">
        <p style="text-align:center; grid-column: 1/-1; color:#888;">A carregar pedidos...</p>
    </div>

    <script>
        function renderizarPedidos(pedidos) {
            const container = document.getElementById('container-pedidos');
            if (!pedidos) {
                container.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color:#888;">Nenhum pedido recebido até ao momento.</p>';
                return;
            }

            container.innerHTML = '';
            Object.keys(pedidos).reverse().forEach(key => {
                const p = pedidos[key];
                const card = document.createElement('div');
                card.className = `card-pedido ${p.estado || 'pendente'}`;

                card.innerHTML = `
                    <div class="pedido-header">
                        <span class="pedido-id">#${key.substr(-4)}</span>
                        <span class="pedido-hora">${p.hora || ''}</span>
                    </div>
                    <div class="cliente-info">
                        <p><b>Cliente:</b> ${p.nome}</p>
                        <p><b>Endereço:</b> ${p.endereco}</p>
                    </div>
                    <div class="itens-lista">${p.itens || ''}</div>
                    <div class="total-destaque">Total: KZ ${p.total ? p.total.toLocaleString('pt-AO') : '0'}</div>
                    <div class="btn-group-card">
                        <button class="btn-card btn-preparo" onclick="alterarEstado('${key}', 'preparo')">🔥 Grelha</button>
                        <button class="btn-card btn-pronto" onclick="alterarEstado('${key}', 'pronto')">✅ Pronto</button>
                        <button class="btn-card btn-entregue" onclick="alterarEstado('${key}', 'entregue')">📦 Concluído</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
