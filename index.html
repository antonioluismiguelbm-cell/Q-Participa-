<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franguité Q Participa - Cardápio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f4f9; color: #333; padding-bottom: 30px; }
        header { background-color: #d32f2f; color: white; text-align: center; padding: 20px; font-size: 22px; font-weight: bold; }
        .container { max-width: 500px; margin: 15px auto; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { color: #d32f2f; margin-bottom: 10px; font-size: 16px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        label { display: block; font-size: 14px; margin: 8px 0 4px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .item-info { font-size: 14px; }
        .item-price { font-weight: bold; color: #d32f2f; font-size: 13px; }
        .qtd-input { width: 60px; text-align: center; padding: 5px; }
        .total-box { background: #ffebee; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; text-align: right; color: #d32f2f; margin-top: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-whatsapp { background-color: #25d366; }
        .btn-call { background-color: #0088cc; }
    </style>
</head>
<body>

    <header>🍗 Franguité Q Participa</header>

    <div class="container">
        
        <!-- Dados do Cliente -->
        <div class="card">
            <h3>👤 Dados para Entrega</h3>
            <label>Nome do Cliente</label>
            <input type="text" id="nome" placeholder="Digite seu nome">

            <label>Endereço / Localização</label>
            <input type="text" id="endereco" placeholder="Ex: Rangel, Nelito Soares">

            <label>Zona de Entrega</label>
            <select id="taxa" onchange="calcularTotal()">
                <option value="1000">Nelito Soares / Rangel - KZ 1.000</option>
                <option value="2000">Benfica / Talatona - KZ 2.000</option>
                <option value="1500">Outras Zonas de Luanda - KZ 1.500</option>
            </select>
        </div>

        <!-- Opções do Cardápio -->
        <div class="card">
            <h3>🍔 Faça o seu Pedido</h3>
            
            <div class="item">
                <div class="item-info">
                    <strong>Hambúrguer Clássico</strong><br>
                    <span class="item-price">KZ 4.000</span>
                </div>
                <input type="number" class="qtd-input" id="qtd1" value="0" min="0" onchange="calcularTotal()">
            </div>

            <div class="item">
                <div class="item-info">
                    <strong>Frango Grelhado (Dose)</strong><br>
                    <span class="item-price">KZ 5.000</span>
                </div>
                <input type="number" class="qtd-input" id="qtd2" value="0" min="0" onchange="calcularTotal()">
            </div>
            
            <div class="total-box" id="exibirTotal">
                Total: KZ 1.000
            </div>
        </div>

        <!-- Botões de Ação -->
        <div class="btn-group">
            <button class="btn btn-whatsapp" onclick="enviarWhatsApp()">📱 Pedir via WhatsApp</button>
            <a href="tel:940595889" class="btn btn-call">📞 Ligar</a>
        </div>

    </div>

    <script>
        function calcularTotal() {
            let p1 = parseInt(document.getElementById('qtd1').value || 0) * 4000;
            let p2 = parseInt(document.getElementById('qtd2').value || 0) * 5000;
            let taxa = parseInt(document.getElementById('taxa').value || 0);
            let total = p1 + p2 + taxa;
            
            document.getElementById('exibirTotal').innerText = "Total: KZ " + total.toLocaleString('pt-AO');
            return { p1, p2, taxa, total };
        }

        function enviarWhatsApp() {
            let nome = document.getElementById('nome').value;
            let endereco = document.getElementById('endereco').value;
            let qtd1 = document.getElementById('qtd1').value;
            let qtd2 = document.getElementById('qtd2').value;
            let { total, taxa } = calcularTotal();

            if (!nome || !endereco) {
                alert("Por favor, preencha o nome e o endereço!");
                return;
            }

            // Mude o número abaixo para o SEU número de WhatsApp com código do país (244)
            let meutelemovel = "244900000000"; 

            let mensagem = `*NOVO PEDIDO - FRANGUITÉ Q PARTICIPA*%0A%0A` +
                           `*Cliente:* ${nome}%0A` +
                           `*Endereço:* ${endereco}%0A%0A` +
                           `*Itens:*%0A` +
                           (qtd1 > 0 ? `- Hambúrguer Clássico (${qtd1}x)%0A` : '') +
                           (qtd2 > 0 ? `- Frango Grelhado (${qtd2}x)%0A` : '') +
                           `%0A*Taxa de Entrega:* KZ ${taxa}%0A` +
                           `*TOTAL:* KZ ${total}`;

            let url = `https://wa.me/${meutelemovel}?text=${mensagem}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
