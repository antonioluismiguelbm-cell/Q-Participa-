<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franguité Q Participa - Cardápio</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; padding: 0; background-color: #f4f4f4; }
        h1 { color: #d32f2f; text-align: center; }
        .item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #e65100; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn:hover { background: #bf360c; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .carrinho { background: #fff3e0; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #ffe0b2; }
    </style>
</head>
<body>

    <h1>🔥 Franguité Q Participa 🔥</h1>

    <div class="item">
        <h3>Frango Grelhado Inteiro</h3>
        <p>Preço: 6.000 Kz</p>
        <button class="btn" onclick="adicionarItem('Frango Grelhado Inteiro', 6000)">Adicionar ao Pedido</button>
    </div>

    <div class="item">
        <h3>Meio Frango Grelhado</h3>
        <p>Preço: 3.500 Kz</p>
        <button class="btn" onclick="adicionarItem('Meio Frango Grelhado', 3500)">Adicionar ao Pedido</button>
    </div>

    <div class="carrinho">
        <h3>Seu Pedido</h3>
        <ul id="lista-carrinho"></ul>
        <p><strong>Total: <span id="total">0</span> Kz</strong></p>

        <label for="nome">Seu Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome">

        <label for="pagamento">Forma de Pagamento:</label>
        <select id="pagamento">
            <option value="Multicaixa Express">Multicaixa Express</option>
            <option value="TPA / Cartão">TPA / Cartão</option>
            <option value="Dinheiro em Mão">Dinheiro em Mão</option>
        </select>

        <button class="btn" onclick="enviarPedido()">Confirmar e Enviar Pedido</button>
    </div>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://caixa-texte-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let carrinho = [];
        let total = 0;

        function adicionarItem(nome, preco) {
            carrinho.push({ nome, preco });
            total += preco;
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const lista = id('lista-carrinho');
            lista.innerHTML = '';
            carrinho.forEach(item => {
                let li = document.createElement('li');
                li.textContent = `${item.nome} - ${item.preco} Kz`;
                lista.appendChild(li);
            });
            id('total').textContent = total;
        }

        function enviarPedido() {
            const nomeCliente = id('nome').value.trim();
            const pagamento = id('pagamento').value;

            if (carrinho.length === 0) {
                alert('Adicione pelo menos um item ao carrinho!');
                return;
            }
            if (!nomeCliente) {
                alert('Por favor, insira o seu nome!');
                return;
            }

            const novoPedido = {
                cliente: nomeCliente,
                itens: carrinho,
                total: total,
                pagamento: pagamento,
                hora: new Date().toLocaleTimeString('pt-AO', { hour: '2-digit', minute: '2-digit' }),
                status: 'Pendente'
            };

            database.ref('pedidos').push(novoPedido).then(() => {
                alert('Pedido enviado com sucesso para o caixa!');
                carrinho = [];
                total = 0;
                id('nome').value = '';
                atualizarCarrinho();
            }).catch(error => {
                alert('Erro ao enviar pedido: ' + error.message);
            });
        }

        function id(el) { return document.getElementById(el); }
    </script>
</body>
</html>
